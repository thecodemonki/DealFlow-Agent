<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealFlow AI — Agent Arena</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; min-height: 100vh; overflow: hidden; }
    .app-layout { display: flex; min-height: 100vh; width: 100%; }
    .blob-arena { flex: 1; position: relative; min-height: 100vh; background: #0a0f1e; overflow: hidden; }
    .arena-demo-btn { position: absolute; top: 16px; left: 16px; z-index: 20; padding: 8px 14px; font-size: 13px; font-weight: 600; color: #fff; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; }
    .arena-demo-btn:hover { background: rgba(255,255,255,0.2); }
    .arena-lines { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    .blob-wrap { position: absolute; transform: translate(-50%, -50%); z-index: 2; display: flex; flex-direction: column; align-items: center; --blob-w: 90px; --blob-h: 90px; --blob-glow: 127, 29, 29; }
    .blob-wrap--orchestrator { --blob-w: 110px; --blob-h: 110px; }
    .blob-wrap--webresearch { --blob-glow: 30, 27, 75; }
    .blob-wrap--documentparser { --blob-glow: 120, 53, 15; }
    .blob-wrap--financialanalyst { --blob-glow: 20, 83, 45; }
    .blob-wrap--legalrisk { --blob-glow: 59, 7, 100; }
    .blob-wrap--synthesis { --blob-glow: 19, 78, 74; }
    @keyframes blob-breathe { 0%, 100% { border-radius: 60% 40% 55% 45% / 50% 60% 40% 55%; } 50% { border-radius: 45% 55% 48% 52% / 58% 42% 52% 48%; } }
    @keyframes blob-glow-pulse { 0%, 100% { box-shadow: 0 0 0 4px rgba(var(--blob-glow), 0.15), 0 8px 24px rgba(0,0,0,0.35); } 50% { box-shadow: 0 0 0 8px rgba(var(--blob-glow), 0.35), 0 12px 28px rgba(0,0,0,0.4); } }
    @keyframes blob-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes blink { 0%, 45%, 55%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.08); } }
    @keyframes speech-in { from { opacity: 0; transform: translateX(-50%) scale(0.85); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
    @keyframes live-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
    .blob { width: var(--blob-w); height: var(--blob-h); position: relative; display: flex; align-items: center; justify-content: center; border-radius: 60% 40% 55% 45% / 50% 60% 40% 55%; animation: blob-breathe 3s ease-in-out infinite; transition: filter 0.35s ease, opacity 0.35s ease; }
    .blob--orchestrator { background: #7f1d1d; }
    .blob--webresearch { background: #1e1b4b; }
    .blob--documentparser { background: #78350f; }
    .blob--financialanalyst { background: #14532d; }
    .blob--legalrisk { background: #3b0764; }
    .blob--synthesis { background: #134e4a; }
    .blob-wrap--done .blob { filter: brightness(1.18); }
    .blob-wrap--active .blob { animation: blob-breathe 3s ease-in-out infinite, blob-glow-pulse 1.4s ease-in-out infinite, blob-bounce 0.6s ease-in-out infinite; }
    .blob-face { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; z-index: 2; }
    .blob-emoji { font-size: 1.75rem; line-height: 1; }
    .blob-wrap--orchestrator .blob-emoji { font-size: 2rem; }
    .blob-emoji-tiny { font-size: 0.65rem; opacity: 0.95; }
    .blob-eyes { display: flex; gap: 6px; margin-top: 4px; }
    .blob-eyes span { width: 6px; height: 6px; border-radius: 50%; background: #fff; display: block; transform-origin: center; }
    .blob-wrap--active .blob-eyes span { animation: blink 2.5s ease-in-out infinite; }
    .blob-wrap--active .blob-eyes span:nth-child(2) { animation-delay: 0.08s; }
    .blob-label { margin-top: 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; color: rgba(255,255,255,0.85); text-transform: uppercase; text-align: center; max-width: 120px; line-height: 1.2; }
    .blob-check { position: absolute; top: -8px; font-size: 18px; color: #4ade80; font-weight: 800; opacity: 0; transform: scale(0.5); transition: opacity 0.3s ease, transform 0.3s ease; z-index: 4; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    .blob-wrap--done .blob-check { opacity: 1; transform: scale(1); }
    .speech-bubble { position: absolute; bottom: calc(100% + 12px); left: 50%; transform: translateX(-50%) scale(0.8); opacity: 0; pointer-events: none; max-width: 160px; padding: 8px 10px; font-size: 12px; line-height: 1.35; color: #0f172a; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 5; }
    .speech-bubble::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #fff; }
    .blob-wrap.speech-on .speech-bubble { opacity: 1; pointer-events: auto; animation: speech-in 0.28s ease-out forwards; }
    #blob-orchestrator { left: 50%; top: 45%; }
    #blob-webresearch { left: 22%; top: 22%; }
    #blob-documentparser { left: 78%; top: 22%; }
    #blob-financialanalyst { left: 18%; top: 72%; }
    #blob-legalrisk { left: 82%; top: 72%; }
    #blob-synthesis { left: 50%; top: 78%; }
    .chat-sidebar { width: 360px; flex-shrink: 0; min-height: 100vh; background: #ffffff; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; }
    .chat-header { padding: 16px 18px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 16px; color: #0f172a; }
    .chat-header-live { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: #64748b; }
    .chat-live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.25); animation: live-pulse 2s ease-in-out infinite; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { display: flex; gap: 10px; align-items: flex-start; }
    .chat-msg__avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .chat-msg--orchestrator .chat-msg__avatar { background: #7f1d1d; }
    .chat-msg--webresearch .chat-msg__avatar { background: #1e1b4b; }
    .chat-msg--documentparser .chat-msg__avatar { background: #78350f; }
    .chat-msg--financialanalyst .chat-msg__avatar { background: #14532d; }
    .chat-msg--legalrisk .chat-msg__avatar { background: #3b0764; }
    .chat-msg--synthesis .chat-msg__avatar { background: #134e4a; }
    .chat-msg__body { flex: 1; min-width: 0; }
    .chat-msg__name { font-size: 11px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .chat-msg__bubble { background: #f8f9fc; border-radius: 12px; padding: 10px 14px; font-size: 13px; line-height: 1.45; color: #334155; }
    .chat-msg__bubble strong { color: #0f172a; }
    .chat-form { padding: 12px 14px 16px; border-top: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 8px; background: #fff; }
    .chat-form input[type=text] { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; color: #334155; }
    .chat-form input:focus { border-color: #4f6ef7; box-shadow: 0 0 0 2px rgba(79, 110, 247, 0.15); }
    .chat-form-row { display: flex; gap: 8px; align-items: center; }
    .chat-form-grow { flex: 1; min-width: 0; }
    .btn-run { padding: 8px 14px; font-size: 13px; font-weight: 600; color: #fff; background: linear-gradient(135deg, #4f6ef7, #3b5bdb); border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    .btn-run:disabled { opacity: 0.55; cursor: not-allowed; }
    .chat-timer { font-size: 12px; font-variant-numeric: tabular-nums; color: #64748b; min-width: 2.5rem; text-align: right; }
    .file-row { font-size: 11px; color: #64748b; }
    .file-row label { color: #4f6ef7; cursor: pointer; text-decoration: underline; }
    .signal-stub { display: none; }
    .results-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(10, 15, 30, 0.72); display: none; align-items: center; justify-content: center; padding: 24px; }
    .results-overlay.visible { display: flex; }
    .results-card { background: #fff; border-radius: 16px; max-width: 480px; width: 100%; padding: 28px 24px; box-shadow: 0 24px 48px rgba(0,0,0,0.35); }
    .results-card h2 { font-size: 18px; color: #0f172a; margin-bottom: 8px; }
    .results-card .rec-line { font-size: 14px; color: #64748b; margin-bottom: 20px; }
    .results-card .rec-value { font-size: 28px; font-weight: 800; color: #d97706; margin-bottom: 8px; }
    .btn-download { display: inline-flex; align-items: center; justify-content: center; width: 100%; margin-top: 16px; padding: 12px; font-weight: 600; font-size: 14px; color: #fff; text-decoration: none; border-radius: 10px; background: linear-gradient(135deg, #059669, #047857); }
    .results-close { margin-top: 12px; width: 100%; padding: 8px; font-size: 13px; color: #64748b; background: transparent; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="blob-arena" id="blobArena">
    <button type="button" class="arena-demo-btn" id="runDemoBtn">Run Demo</button>
    <svg class="arena-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
      <line x1="50" y1="45" x2="22" y2="22" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="1.2 0.8" vector-effect="non-scaling-stroke"/>
      <line x1="50" y1="45" x2="78" y2="22" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="1.2 0.8" vector-effect="non-scaling-stroke"/>
      <line x1="50" y1="45" x2="18" y2="72" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="1.2 0.8" vector-effect="non-scaling-stroke"/>
      <line x1="50" y1="45" x2="82" y2="72" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="1.2 0.8" vector-effect="non-scaling-stroke"/>
      <line x1="50" y1="45" x2="50" y2="78" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="1.2 0.8" vector-effect="non-scaling-stroke"/>
    </svg>
    <div class="blob-wrap blob-wrap--orchestrator" id="blob-orchestrator" data-agent="orchestrator">
      <div class="speech-bubble"><span class="speech-bubble__text"></span></div>
      <div class="blob-check">✓</div>
      <div class="blob blob--orchestrator"><div class="blob-face"><div><span class="blob-emoji">🎼</span><span class="blob-emoji-tiny">🪄</span></div><div class="blob-eyes"><span></span><span></span></div></div></div>
      <div class="blob-label">Conductor</div>
    </div>
    <div class="blob-wrap blob-wrap--webresearch" id="blob-webresearch" data-agent="webresearch">
      <div class="speech-bubble"><span class="speech-bubble__text"></span></div>
      <div class="blob-check">✓</div>
      <div class="blob blob--webresearch"><div class="blob-face"><div><span class="blob-emoji">🧐</span><span class="blob-emoji-tiny">🔍</span></div><div class="blob-eyes"><span></span><span></span></div></div></div>
      <div class="blob-label">Detective</div>
    </div>
    <div class="blob-wrap blob-wrap--documentparser" id="blob-documentparser" data-agent="documentparser">
      <div class="speech-bubble"><span class="speech-bubble__text"></span></div>
      <div class="blob-check">✓</div>
      <div class="blob blob--documentparser"><div class="blob-face"><div><span class="blob-emoji">📜</span><span class="blob-emoji-tiny">👓</span></div><div class="blob-eyes"><span></span><span></span></div></div></div>
      <div class="blob-label">Librarian</div>
    </div>
    <div class="blob-wrap blob-wrap--financialanalyst" id="blob-financialanalyst" data-agent="financialanalyst">
      <div class="speech-bubble"><span class="speech-bubble__text"></span></div>
      <div class="blob-check">✓</div>
      <div class="blob blob--financialanalyst"><div class="blob-face"><div><span class="blob-emoji">💼</span><span class="blob-emoji-tiny">📈</span></div><div class="blob-eyes"><span></span><span></span></div></div></div>
      <div class="blob-label">Banker</div>
    </div>
    <div class="blob-wrap blob-wrap--legalrisk" id="blob-legalrisk" data-agent="legalrisk">
      <div class="speech-bubble"><span class="speech-bubble__text"></span></div>
      <div class="blob-check">✓</div>
      <div class="blob blob--legalrisk"><div class="blob-face"><div><span class="blob-emoji">⚖️</span><span class="blob-emoji-tiny">🔨</span></div><div class="blob-eyes"><span></span><span></span></div></div></div>
      <div class="blob-label">Judge</div>
    </div>
    <div class="blob-wrap blob-wrap--synthesis" id="blob-synthesis" data-agent="synthesis">
      <div class="speech-bubble"><span class="speech-bubble__text"></span></div>
      <div class="blob-check">✓</div>
      <div class="blob blob--synthesis"><div class="blob-face"><div><span class="blob-emoji">✨</span><span class="blob-emoji-tiny">🪄</span></div><div class="blob-eyes"><span></span><span></span></div></div></div>
      <div class="blob-label">Wizard</div>
    </div>
  </div>
  <aside class="chat-sidebar">
    <div class="chat-header"><span>Agent Chat</span><span class="chat-header-live"><span class="chat-live-dot"></span> Live</span></div>
    <div class="chat-messages" id="activityFeed"></div>
    <div class="chat-form">
      <input type="text" id="companyName" placeholder="Company name" autocomplete="organization" />
      <input type="text" id="industry" placeholder="Industry" value="financial services" />
      <div class="chat-form-row">
        <div class="chat-form-grow">
          <input type="file" id="fileInput" multiple accept=".pdf,.xlsx,.csv,.txt" style="display:none" />
          <div class="file-row"><label for="fileInput">Attach files</label> <span id="fileList"></span></div>
        </div>
        <span class="chat-timer" id="analyzeTimer" aria-live="polite"></span>
        <button type="button" class="btn-run" id="analyzeBtn">Run →</button>
      </div>
    </div>
  </aside>
</div>
<div class="signal-stub">
  <div id="sig-market"><span id="sig-market-status"></span></div>
  <div id="sig-financial"><span id="sig-financial-status"></span></div>
  <div id="sig-legal"><span id="sig-legal-status"></span></div>
  <div id="sig-memo"><span id="sig-memo-status"></span></div>
</div>
<div class="results-overlay" id="resultsOverlay">
  <div class="results-card">
    <h2>Analysis complete</h2>
    <div class="rec-value" id="recValue">CONDITIONAL</div>
    <div class="rec-line" id="recConfidence"></div>
    <p style="font-size:13px;color:#334155;line-height:1.5;margin-top:12px;" id="memo-summary"></p>
    <a class="btn-download" id="downloadBtn" href="#" target="_blank">Download investment memo PDF</a>
    <button type="button" class="results-close" id="resultsCloseBtn">Close</button>
  </div>
</div>
<script>
const API = window.location.origin;
let currentDealId = null, pollTimer = null, activityStep = 0, runTimerInterval = null;
const speechTimers = {};
const AGENT_CHAT_CLASS = { orchestrator: 'chat-msg--orchestrator', webresearch: 'chat-msg--webresearch', documentparser: 'chat-msg--documentparser', financialanalyst: 'chat-msg--financialanalyst', legalrisk: 'chat-msg--legalrisk', synthesis: 'chat-msg--synthesis' };
const AGENT_DISPLAY = { orchestrator: 'Orchestrator', webresearch: 'WebResearch', documentparser: 'DocumentParser', financialanalyst: 'FinancialAnalyst', legalrisk: 'LegalRisk', synthesis: 'Synthesis' };
function clearRunTimer(){ if(runTimerInterval){ clearInterval(runTimerInterval); runTimerInterval=null;} var t=document.getElementById('analyzeTimer'); if(t) t.textContent=''; }
function startRunTimer(){ clearRunTimer(); var el=document.getElementById('analyzeTimer'); if(!el) return; var sec=0; function r(){ el.textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0'); } r(); runTimerInterval=setInterval(function(){ sec++; r(); },1000); }
function stripHtml(html){ var d=document.createElement('div'); d.innerHTML=html; return d.textContent||d.innerText||''; }
function inferAgentFromHtml(html){ var t=stripHtml(html).toLowerCase(); if(t.indexOf('orchestrator')!==-1) return 'orchestrator'; if(t.indexOf('webresearch')!==-1) return 'webresearch'; if(t.indexOf('documentparser')!==-1) return 'documentparser'; if(t.indexOf('financialanalyst')!==-1) return 'financialanalyst'; if(t.indexOf('legalrisk')!==-1) return 'legalrisk'; if(t.indexOf('synthesis')!==-1) return 'synthesis'; return null; }
function showSpeechBubble(agentId, text){ var wrap=document.getElementById('blob-'+agentId); if(!wrap) return; var span=wrap.querySelector('.speech-bubble__text'); if(!span) return; if(speechTimers[agentId]){ clearTimeout(speechTimers[agentId]); speechTimers[agentId]=null;} span.textContent=text; wrap.classList.add('speech-on'); speechTimers[agentId]=setTimeout(function(){ wrap.classList.remove('speech-on'); speechTimers[agentId]=null; },3000); }
document.getElementById('fileInput').addEventListener('change', function(){ var names=Array.from(this.files).map(function(f){return f.name;}).join(', '); document.getElementById('fileList').textContent=names||''; });
function setAgentStatus(agent, state, label){ var wrap=document.getElementById('blob-'+agent); if(!wrap) return; wrap.classList.remove('blob-wrap--active','blob-wrap--done'); if(state==='active') wrap.classList.add('blob-wrap--active'); else if(state==='done') wrap.classList.add('blob-wrap--done'); }
function addFeedItem(icon, html, agentId, speechText){ var feed=document.getElementById('activityFeed'); var agent=agentId||inferAgentFromHtml(html); var row=document.createElement('div'); row.className='chat-msg'+(agent&&AGENT_CHAT_CLASS[agent]?' '+AGENT_CHAT_CLASS[agent]:''); var name=agent?AGENT_DISPLAY[agent]||agent:'Band'; row.innerHTML='<div class="chat-msg__avatar">'+(icon||'💬')+'</div><div class="chat-msg__body"><div class="chat-msg__name">'+name+'</div><div class="chat-msg__bubble">'+html+'</div></div>'; feed.appendChild(row); feed.scrollTop=feed.scrollHeight; if(agent&&speechText) showSpeechBubble(agent,speechText); }
function setSignal(id, ok, text){ var card=document.getElementById('sig-'+id); var status=document.getElementById('sig-'+id+'-status'); if(!card||!status) return; if(ok) card.classList.add('received'); status.textContent=text; }
const STEPS=[
 function(){ setAgentStatus('orchestrator','active'); showSpeechBubble('orchestrator','Kicking off pipeline…'); addFeedItem('🎼','<strong>Orchestrator</strong> received deal request — kicking off pipeline','orchestrator'); },
 function(){ setAgentStatus('webresearch','active'); showSpeechBubble('webresearch','Scanning the open web…'); addFeedItem('🧐','<strong>WebResearch</strong> querying Wikipedia + web for market data','webresearch'); },
 function(){ setAgentStatus('documentparser','active'); showSpeechBubble('documentparser','Reading your uploads…'); addFeedItem('📜','<strong>DocumentParser</strong> scanning uploaded documents','documentparser'); },
 function(){ setAgentStatus('orchestrator','done'); showSpeechBubble('orchestrator','Routing specialists…'); addFeedItem('🤝','Band: Orchestrator routed tasks to all specialist agents','orchestrator'); },
 function(){ setAgentStatus('webresearch','done'); setSignal('market',true,'✓ Received'); showSpeechBubble('webresearch','Market signal posted.'); addFeedItem('✅','<strong>SIGNAL:market_research</strong> posted to Band room','webresearch'); },
 function(){ setAgentStatus('documentparser','done'); showSpeechBubble('documentparser','Parse complete.'); addFeedItem('✅','<strong>DocumentParser</strong> extraction complete','documentparser'); },
 function(){ setAgentStatus('financialanalyst','active'); showSpeechBubble('financialanalyst','Crunching numbers…'); addFeedItem('💼','<strong>FinancialAnalyst</strong> calculating valuation, CAGR, runway','financialanalyst'); },
 function(){ setAgentStatus('legalrisk','active'); showSpeechBubble('legalrisk','Reviewing clauses…'); addFeedItem('⚖️','<strong>LegalRisk</strong> reviewing change-of-control clauses and IP risks','legalrisk'); },
 function(){ setAgentStatus('financialanalyst','done'); setSignal('financial',true,'✓ Received'); showSpeechBubble('financialanalyst','Financials in.'); addFeedItem('✅','<strong>SIGNAL:financial_analysis</strong> posted — provisional valuation range (pending full data)','financialanalyst'); },
 function(){ setAgentStatus('legalrisk','done'); setSignal('legal',true,'✓ Received'); showSpeechBubble('legalrisk','Legal memo in.'); addFeedItem('✅','<strong>SIGNAL:legal_risk</strong> posted — CoC and key contractual risks flagged for review','legalrisk'); },
 function(){ setAgentStatus('synthesis','active'); showSpeechBubble('synthesis','Weaving the memo…'); addFeedItem('✨','<strong>Synthesis</strong> consolidating all signals into investment memo','synthesis'); },
 function(){ setAgentStatus('synthesis','done'); setSignal('memo',true,'✓ Generated'); showSpeechBubble('synthesis','Done — memo ready.'); addFeedItem('🎉','<strong>SIGNAL:investment_memo</strong> complete — PDF generated','synthesis'); showResults(); }
];
function showResults(){ var company=(document.getElementById('companyName').value||'').trim()||'Unknown company'; var industry=(document.getElementById('industry').value||'').trim()||'your industry'; document.getElementById('recValue').textContent='CONDITIONAL'; document.getElementById('recConfidence').textContent='Medium confidence · Web-only analysis · '+company+' · '+industry; document.getElementById('memo-summary').textContent=company+' is a leading player in '+industry+'. Based on available signals, the business shows differentiated positioning within its sector; full diligence would validate revenue quality, margin structure, and governance.'; document.getElementById('downloadBtn').href=API+'/memo/latest'; document.getElementById('resultsOverlay').classList.add('visible'); }
document.getElementById('resultsCloseBtn').addEventListener('click', function(){ document.getElementById('resultsOverlay').classList.remove('visible'); });
document.getElementById('analyzeBtn').addEventListener('click', function(){ startAnalysis(); });
document.getElementById('runDemoBtn').addEventListener('click', function(){ document.getElementById('companyName').value='Demo Corp'; document.getElementById('industry').value='Technology'; startAnalysis(); });
async function startAnalysis(){ var company=document.getElementById('companyName').value.trim(); if(!company){ alert('Please enter a company name.'); return;} ['orchestrator','webresearch','documentparser','financialanalyst','legalrisk','synthesis'].forEach(function(a){ setAgentStatus(a,'idle'); var w=document.getElementById('blob-'+a); if(w) w.classList.remove('blob-wrap--active','blob-wrap--done','speech-on'); }); ['market','financial','legal','memo'].forEach(function(s){ var card=document.getElementById('sig-'+s); var status=document.getElementById('sig-'+s+'-status'); if(card) card.classList.remove('received'); if(status) status.textContent='Waiting…'; }); document.getElementById('activityFeed').innerHTML=''; document.getElementById('resultsOverlay').classList.remove('visible'); var btn=document.getElementById('analyzeBtn'); btn.disabled=true; btn.textContent='…'; startRunTimer(); activityStep=0; if(pollTimer) clearInterval(pollTimer); try{ var fd=new FormData(); fd.append('company_name',company); fd.append('notes','Industry: '+document.getElementById('industry').value); var files=document.getElementById('fileInput').files; for(var i=0;i<files.length;i++) fd.append('files',files[i]); await fetch(API+'/analyze',{method:'POST',body:fd}); }catch(e){} function nextStep(){ if(activityStep<STEPS.length){ STEPS[activityStep](); activityStep++; var delay=activityStep<4?1200:activityStep<9?1800:2400; setTimeout(nextStep,delay);} else { clearRunTimer(); btn.disabled=false; btn.textContent='Run →'; } } nextStep(); }
</script>
</body>
</html>
